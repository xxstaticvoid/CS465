
<!-- <pre> {{ trips | json }} </pre> -->

<div>
  <button (click)="addTrip()" class="btn btn-info">Add Trip</button>
</div>

<div class="row">
  <!-- new for loop -->
  @for (trip of trips(); track trip.code) {
      <div class="col-md-4">
        <app-trip-card [trip]="trip" class="card-deck mt-2">ok,</app-trip-card>
      </div>
  } @empty {
      <p>No trips loaded.</p>
  }
</div>
